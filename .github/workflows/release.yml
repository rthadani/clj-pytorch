on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: 
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@12
        with: 
          cli: latest
      - run: clojure -T:build deploy
        env: 
          CLOJARS_USERNAME: ${{
secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{
secrets.CLOJARS_PASSWORD }}
